version: 1
applications:
  - appRoot: app
    env:
      variables:
        AMPLIFY_MONOREPO_APP_ROOT: app
    frontend:
      phases:
        preBuild:
          commands:
            - yarn install --frozen-lockfile
        build:
          commands:
            - yarn run build
        postBuild:
          commands:
            - pwd
            - ls -la
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
